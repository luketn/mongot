apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://host.docker.internal:9090
    isDefault: true
    editable: true

  - name: Tempo
    type: tempo
    access: proxy
    url: http://host.docker.internal:3200
    isDefault: false
    editable: true
    jsonData:
      lokiSearch:
        datasourceUid: 'prometheus'
      nodeGraph:
        enabled: true
      serviceMap:
        enabled: true